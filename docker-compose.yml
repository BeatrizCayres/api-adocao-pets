services:
  database:
    image: matheusfs/mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'petsdb'
      MYSQL_ROOT_HOST: '%'
    volumes:
      - 'mysql-data:/var/lib/mysql'
    restart: unless-stopped
    mem_limit: '${DB_MEM_LIMIT:-4g}'
volumes:
  mysql-data:
    driver: local
